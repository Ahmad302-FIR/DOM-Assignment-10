<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Assignment #10 - Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Todo App</h1>
        <p class="subtitle">Create, Read, Update, Delete with Local Storage</p>

        <!-- Task 1: Add Task -->
        <div class="add-task">
            <input type="text" id="taskInput" placeholder="Enter a new task..." class="task-input">
            <button id="addBtn" class="btn add-btn">Add Task</button>
        </div>

        <!-- Task List (ul) -->
        <ul id="taskList" class="task-list"></ul>

        <!-- Task 6: Clear All Tasks -->
        <button id="clearAllBtn" class="btn clear-btn">Clear All Tasks</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
